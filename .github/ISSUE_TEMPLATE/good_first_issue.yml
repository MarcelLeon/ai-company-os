name: Good first issue
description: A small, well-scoped starter task for new AICO contributors.
title: "[good first issue]: "
labels: ["good first issue"]
body:
  - type: markdown
    attributes:
      value: |
        Use this template for starter tasks that can be finished without knowing the full codebase.
  - type: textarea
    id: outcome
    attributes:
      label: Desired outcome
      description: What should be true when this issue is done?
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Suggested files
      description: Point contributors to the smallest useful part of the repo.
      placeholder: |
        - src/aico/...
        - tests/unit/...
        - docs/...
    validations:
      required: true
  - type: textarea
    id: verification
    attributes:
      label: Verification
      description: Which commands or manual checks prove the change?
      placeholder: |
        uv run pytest tests/unit/...
        uv run ruff check ...
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Context
      description: Relevant docs, ADRs, pitfalls, or examples.
